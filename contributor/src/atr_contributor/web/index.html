<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATR -- Technique Review</title>
<style>
  :root { --ink:#23201b; --paper:#f6f1e7; --line:#d9cfbe; --accent:#7a1f1a; --ok:#2f6b34; --muted:#8a8170; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Georgia, 'Times New Roman', serif; color:var(--ink); background:var(--paper); }
  header { display:flex; align-items:center; gap:1rem; padding:.7rem 1.2rem; border-bottom:1px solid var(--line); background:#efe8d9; position:sticky; top:0; z-index:5; }
  header h1 { font-size:1.05rem; margin:0; font-weight:600; letter-spacing:.02em; }
  header .who { color:var(--muted); font-size:.85rem; }
  .bar { flex:1; height:8px; background:#e3dac8; border-radius:4px; overflow:hidden; max-width:340px; }
  .bar > i { display:block; height:100%; background:var(--ok); width:0; }
  .count { font-size:.85rem; color:var(--muted); min-width:7rem; text-align:right; }
  main { max-width:1100px; margin:0 auto; padding:1.2rem; }
  .caption { font-size:1.15rem; margin:.2rem 0 .1rem; }
  .sub { color:var(--muted); font-size:.85rem; margin-bottom:1rem; }
  .seqhead { display:flex; align-items:center; gap:.6rem; margin:.4rem 0; }
  .seqhead label { font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  .photos { display:flex; gap:.7rem; flex-wrap:wrap; margin-bottom:1.1rem; }
  .frame { background:#fff; border:1px solid var(--line); border-radius:6px; padding:.4rem; width:210px; }
  .frame img { display:block; max-height:230px; max-width:100%; margin:0 auto; }
  .frame .ctrls { display:flex; gap:.2rem; justify-content:center; margin-top:.35rem; }
  .frame .ctrls button { padding:.15rem .45rem; font-size:.8rem; line-height:1; }
  .frame input.cap { width:100%; margin-top:.35rem; font-size:.85rem; padding:.3rem .4rem; border:1px solid var(--line); border-radius:4px; font-family:inherit; }
  .frame .idx { text-align:center; font-size:.75rem; color:var(--muted); }
  form { display:grid; grid-template-columns: repeat(2, 1fr); gap:.9rem 1.4rem; }
  .field { display:flex; flex-direction:column; gap:.25rem; }
  .field.full { grid-column: 1 / -1; }
  label { font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  input, textarea, select { font-family:inherit; font-size:1rem; padding:.5rem .6rem; border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--ink); }
  textarea { min-height:5rem; resize:vertical; }
  .names { grid-column:1/-1; display:flex; gap:.6rem; align-items:end; }
  .names .field { flex:1; }
  #swap { padding:.55rem .7rem; align-self:end; margin-bottom:1px; }
  .row { display:flex; gap:1.4rem; }
  .row .field { flex:1; }
  .forms { display:flex; gap:1rem; flex-wrap:wrap; padding-top:.2rem; }
  .forms label { display:flex; align-items:center; gap:.35rem; text-transform:none; letter-spacing:0; font-size:.95rem; color:var(--ink); }
  .actions { grid-column:1/-1; display:flex; gap:.7rem; align-items:center; margin-top:.4rem; flex-wrap:wrap; }
  button { font-family:inherit; font-size:.95rem; padding:.55rem 1.1rem; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--ink); cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.good { background:var(--ok); color:#fff; border-color:var(--ok); }
  button.ghost { color:var(--muted); }
  button.mini { padding:.25rem .6rem; font-size:.85rem; }
  .nav { margin-left:auto; display:flex; gap:.5rem; align-items:center; }
  .saved { color:var(--ok); font-size:.85rem; opacity:0; transition:opacity .2s; }
  .saved.show { opacity:1; }
  .badge { font-size:.72rem; padding:.1rem .45rem; border-radius:10px; border:1px solid var(--line); color:var(--muted); }
  .badge.done { background:#e4efe0; color:var(--ok); border-color:#bcd9b6; }
  /* add-image picker */
  .picker { position:fixed; inset:0; background:rgba(30,26,20,.55); display:none; align-items:center; justify-content:center; z-index:20; }
  .picker.open { display:flex; }
  .picker .box { background:var(--paper); border-radius:8px; max-width:920px; width:92%; max-height:84vh; overflow:auto; padding:1rem 1.2rem; }
  .picker h3 { margin:.2rem 0 .8rem; }
  .grid { display:flex; flex-wrap:wrap; gap:.5rem; }
  .grid figure { margin:0; width:150px; background:#fff; border:1px solid var(--line); border-radius:5px; padding:.3rem; cursor:pointer; }
  .grid figure.used { opacity:.4; }
  .grid img { display:block; max-height:120px; max-width:100%; margin:0 auto; }
  .grid figcaption { text-align:center; font-size:.72rem; color:var(--muted); padding-top:.2rem; }
</style>
</head>
<body>
<header>
  <h1>ATR &middot; Technique Review</h1>
  <span class="who" id="who"></span>
  <div class="bar"><i id="barfill"></i></div>
  <span class="count" id="count">--</span>
</header>
<main>
  <div id="card">
    <div class="caption" id="cap">Loading...</div>
    <div class="sub" id="meta"></div>

    <div class="seqhead">
      <label>Image sequence</label>
      <button class="mini" id="addimg">+ Add image</button>
      <span class="sub" id="seqnote" style="margin:0"></span>
    </div>
    <div class="photos" id="photos"></div>

    <form id="form" onsubmit="return false;">
      <div class="names">
        <div class="field">
          <label>Name (romaji)</label>
          <input id="name_romaji" placeholder="e.g. katate-dori shiho-nage" autocomplete="off">
        </div>
        <button id="swap" title="Swap romaji and Japanese">&#8644;</button>
        <div class="field">
          <label>Name (Japanese)</label>
          <input id="name_native" placeholder="" autocomplete="off">
        </div>
      </div>
      <div class="row full">
        <div class="field">
          <label>Attack</label>
          <input id="attack" list="attacks" autocomplete="off">
        </div>
        <div class="field">
          <label>Technique</label>
          <input id="technique" list="techniques" autocomplete="off">
        </div>
        <div class="field">
          <label>Direction</label>
          <select id="direction">
            <option value="">--</option>
            <option value="omote">omote</option>
            <option value="ura">ura</option>
          </select>
        </div>
      </div>
      <div class="field full">
        <label>Form</label>
        <div class="forms" id="forms"></div>
      </div>
      <div class="field full">
        <label>What the name doesn't carry (connection, timing, quality of kuzushi)</label>
        <textarea id="note" placeholder="Optional. The qualitative layer -- in your words."></textarea>
      </div>
      <div class="actions">
        <button class="good" id="confirm">Confirm as correct</button>
        <button class="primary" id="correct">Save correction</button>
        <button class="ghost" id="skip">Skip</button>
        <button class="ghost" id="reject" title="Not a technique (OCR noise, section header, etc.)">Not a technique</button>
        <span class="saved" id="saved">saved</span>
        <div class="nav">
          <button id="prev">&larr; Prev</button>
          <span class="badge" id="pos"></span>
          <button id="next">Next &rarr;</button>
          <button id="nextnew" class="primary">Next unreviewed</button>
        </div>
      </div>
    </form>
  </div>
</main>

<div class="picker" id="picker">
  <div class="box">
    <h3>Add an image to the sequence <button class="mini ghost" id="closepick" style="float:right">close</button></h3>
    <div class="grid" id="pickgrid"></div>
  </div>
</div>

<datalist id="attacks">
  <option>shomenuchi</option><option>yokomenuchi</option><option>tsuki</option>
  <option>jodan-tsuki</option><option>chudan-tsuki</option>
  <option>katate-dori</option><option>kosa-dori</option><option>morote-dori</option>
  <option>ryote-dori</option><option>kata-dori</option><option>ryokata-dori</option>
  <option>mune-dori</option><option>eri-dori</option><option>sode-dori</option>
  <option>ushiro-ryote-dori</option><option>ushiro-ryokata-dori</option>
  <option>ushiro-eri-dori</option><option>ushiro-kubishime</option>
</datalist>
<datalist id="techniques">
  <option>ikkyo</option><option>nikyo</option><option>sankyo</option><option>yonkyo</option><option>gokyo</option>
  <option>iriminage</option><option>shihonage</option><option>kotegaeshi</option><option>kaitennage</option>
  <option>tenchinage</option><option>koshinage</option><option>jujigarami</option><option>kokyunage</option>
  <option>kokyuho</option><option>udekimenage</option><option>hijikimeosae</option>
  <option>sumiotoshi</option><option>aikiotoshi</option>
</datalist>

<script>
const FORMS = ["tachiwaza","suwariwaza","hanmihandachi","ken","jo"];
const CJK = /[぀-ヿ㐀-鿿豈-﫿]/;
let QUEUE = [], idx = 0, current = null, seq = [], available = [];

const $ = id => document.getElementById(id);
function clean(s){ return (s||"").replace(/\s+/g," ").trim(); }
async function api(path, opts){ const r = await fetch(path, opts); if(!r.ok) throw new Error(path+" "+r.status); return r.json(); }

async function boot(){
  const prog = await api("/api/progress");
  $("who").textContent = prog.reviewer_name || prog.reviewer;
  QUEUE = await api("/api/queue");
  $("forms").innerHTML = FORMS.map(f =>
    `<label><input type="checkbox" value="${f}" class="formck"> ${f}</label>`).join("");
  const firstNew = QUEUE.findIndex(q => !q.verdict);
  idx = firstNew >= 0 ? firstNew : 0;
  await load();
  renderProgress(prog);
}

function renderProgress(p){
  const pct = p.total ? Math.round(100*p.reviewed/p.total) : 0;
  $("barfill").style.width = pct + "%";
  $("count").textContent = `${p.reviewed} / ${p.total} reviewed`;
}

async function load(){
  const item = QUEUE[idx];
  const d = await api("/api/technique/" + encodeURIComponent(item.id));
  current = d; available = d.available || [];
  const t = d.technique, r = d.review;
  $("cap").textContent = clean(t.raw_caption || t.name_romaji || t.id);
  const s = t.source || {};
  const struct = [t.context, t.kind, t.weapon, t.form].filter(x => x && x !== "technique" && x !== "taijutsu");
  const tag = struct.length ? "  ·  " + struct.join(" / ") : "";
  $("meta").textContent = `${s.title || s.book || ""}  ·  p.${s.pdf_page || "?"}  ·  ${(t.provenance||{}).performer_name||""} (${(t.provenance||{}).lineage||""})${tag}`;
  // weapon records (suburi/kata/kumi) are not paired attacks -- de-emphasize the attack field
  const weapon = t.context === "aiki-ken" || t.context === "aiki-jo";
  $("attack").placeholder = weapon ? "(weapon form -- usually no attack)" : "";

  // working keyframe sequence (editable copy)
  seq = (d.keyframes || []).map(k => ({image:k.image, img:k.img, caption:k.caption||""}));
  renderSeq();

  // name fields: route OCR Japanese into the native box, leave romaji blank to type.
  const provisional = clean(t.raw_caption || t.name_romaji || "");
  if(r){
    $("name_romaji").value = r.name_romaji || "";
    $("name_native").value = r.name_native || "";
  } else if(CJK.test(provisional)){
    $("name_romaji").value = "";
    $("name_native").value = provisional;
  } else {
    $("name_romaji").value = provisional;
    $("name_native").value = t.name_native || "";
  }
  const slots = (r && r.slots) || t.slots || {};
  $("attack").value = slots.attack || "";
  $("technique").value = slots.technique || "";
  $("direction").value = slots.direction || "";
  $("note").value = (r && r.note) || "";
  const formset = new Set(slots.form || []);
  document.querySelectorAll(".formck").forEach(c => c.checked = formset.has(c.value));

  $("pos").textContent = `${idx+1} / ${QUEUE.length}` + (item.verdict ? `  ·  ${item.verdict}` : "");
  $("pos").className = "badge" + (item.verdict ? " done" : "");
}

function renderSeq(){
  $("seqnote").textContent = seq.length + (seq.length===1?" frame":" frames");
  $("photos").innerHTML = seq.map((k,i) => `
    <div class="frame" data-i="${i}">
      <div class="idx">${i+1}</div>
      <img src="${k.img}" alt="frame ${i+1}" loading="lazy">
      <div class="ctrls">
        <button data-act="left" ${i===0?"disabled":""} title="move left">&larr;</button>
        <button data-act="del" title="remove">&#215;</button>
        <button data-act="right" ${i===seq.length-1?"disabled":""} title="move right">&rarr;</button>
      </div>
      <input class="cap" data-i="${i}" placeholder="caption (e.g. count / phase)" value="${(k.caption||"").replace(/"/g,'&quot;')}">
    </div>`).join("") || "<em>(no images)</em>";
  $("photos").querySelectorAll(".ctrls button").forEach(b => b.onclick = () => {
    const i = +b.closest(".frame").dataset.i, act = b.dataset.act;
    if(act==="del") seq.splice(i,1);
    else if(act==="left" && i>0) [seq[i-1],seq[i]]=[seq[i],seq[i-1]];
    else if(act==="right" && i<seq.length-1) [seq[i+1],seq[i]]=[seq[i],seq[i+1]];
    renderSeq();
  });
  $("photos").querySelectorAll("input.cap").forEach(inp => inp.oninput = () => {
    seq[+inp.dataset.i].caption = inp.value;
  });
}

// add-image picker
$("addimg").onclick = () => {
  const used = new Set(seq.map(k=>k.image));
  $("pickgrid").innerHTML = available.map(a => `
    <figure class="${used.has(a.image)?"used":""}" data-image="${a.image}" data-img="${a.img}">
      <img src="${a.img}" loading="lazy"><figcaption>${a.page||""}</figcaption>
    </figure>`).join("") || "<em>no other images for this book</em>";
  $("pickgrid").querySelectorAll("figure").forEach(f => f.onclick = () => {
    seq.push({image:f.dataset.image, img:f.dataset.img, caption:""});
    renderSeq(); $("picker").classList.remove("open");
  });
  $("picker").classList.add("open");
};
$("closepick").onclick = () => $("picker").classList.remove("open");
$("picker").onclick = e => { if(e.target===$("picker")) $("picker").classList.remove("open"); };

$("swap").onclick = () => {
  const a=$("name_romaji").value; $("name_romaji").value=$("name_native").value; $("name_native").value=a;
};

function seqChanged(){
  const orig = (current.review && current.review.keyframes) ||
    (current.keyframes||[]).map(k=>({image:k.image,caption:k.caption||""}));
  // compare image order + captions
  if(seq.length !== current.keyframes.length) return true;
  return JSON.stringify(seq.map(k=>[k.image,k.caption])) !==
         JSON.stringify((current.keyframes||[]).map(k=>[k.image,k.caption||""]));
}

function payload(verdict){
  return {
    verdict,
    name_romaji: clean($("name_romaji").value),
    name_native: clean($("name_native").value),
    slots: {
      attack: clean($("attack").value),
      technique: clean($("technique").value),
      direction: $("direction").value,
      form: [...document.querySelectorAll(".formck")].filter(c=>c.checked).map(c=>c.value),
    },
    keyframes: seqChanged() ? seq.map(k=>({image:k.image, caption:k.caption||""})) : null,
    note: $("note").value.trim(),
  };
}

async function save(verdict, advance){
  const item = QUEUE[idx];
  const rec = await api("/api/review/" + encodeURIComponent(item.id), {
    method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload(verdict))
  });
  item.verdict = rec.verdict;
  $("saved").classList.add("show"); setTimeout(()=>$("saved").classList.remove("show"), 900);
  renderProgress(await api("/api/progress"));
  if(advance) await goNextNew(); else await load();
}

async function go(delta){ idx = (idx + delta + QUEUE.length) % QUEUE.length; await load(); }
async function goNextNew(){
  const after = QUEUE[idx].id;
  const {id} = await api("/api/next?after=" + encodeURIComponent(after));
  if(id == null){ alert("All techniques reviewed."); return; }
  idx = QUEUE.findIndex(q => q.id === id); await load();
}

$("confirm").onclick = () => save("confirmed", true);
$("correct").onclick = () => save("corrected", true);
$("skip").onclick    = () => save("skip", true);
$("reject").onclick  = () => save("rejected", true);
$("prev").onclick    = () => go(-1);
$("next").onclick    = () => go(1);
$("nextnew").onclick = () => goNextNew();
document.addEventListener("keydown", e => {
  if(e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
  if(e.key === "ArrowRight") go(1);
  if(e.key === "ArrowLeft") go(-1);
});

boot().catch(e => { $("cap").textContent = "Error: " + e.message; });
</script>
</body>
</html>
