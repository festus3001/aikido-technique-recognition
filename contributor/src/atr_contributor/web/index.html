<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATR -- Page Review</title>
<style>
  :root { --ink:#23201b; --paper:#f6f1e7; --line:#d9cfbe; --accent:#7a1f1a; --ok:#2f6b34; --muted:#8a8170; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: Georgia, 'Times New Roman', serif; color:var(--ink); background:var(--paper); }
  header { display:flex; align-items:center; gap:.8rem; padding:.6rem 1rem; border-bottom:1px solid var(--line); background:#efe8d9; position:sticky; top:0; z-index:10; flex-wrap:wrap; }
  header h1 { font-size:1rem; margin:0; font-weight:600; letter-spacing:.02em; white-space:nowrap; }
  header .who { color:var(--muted); font-size:.82rem; }
  select, input[type=number] { font-family:inherit; font-size:.95rem; padding:.3rem .5rem; border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--ink); }
  .bar { width:200px; height:7px; background:#e3dac8; border-radius:4px; overflow:hidden; }
  .bar > i { display:block; height:100%; background:var(--ok); width:0; }
  .count { font-size:.8rem; color:var(--muted); }
  button { font-family:inherit; font-size:.92rem; padding:.4rem .9rem; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--ink); cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.good { background:var(--ok); color:#fff; border-color:var(--ok); }
  button.ghost { color:var(--muted); }
  button.mini { padding:.2rem .55rem; font-size:.82rem; }
  button:disabled { opacity:.5; cursor:default; }
  main { display:flex; gap:0; align-items:flex-start; }
  /* LEFT: raw page + overlay */
  .left { width:46%; position:sticky; top:52px; align-self:flex-start; max-height:calc(100vh - 52px); overflow:auto; padding:1rem; border-right:1px solid var(--line); }
  .pagewrap { position:relative; display:inline-block; background:#fff; border:1px solid var(--line); }
  .pagewrap img { display:block; max-width:100%; height:auto; }
  .ovl { position:absolute; border:2px solid var(--accent); background:rgba(122,31,26,.08); font-size:.7rem; color:#fff; }
  .ovl b { background:var(--accent); padding:0 .25rem; position:absolute; top:-1px; left:-1px; }
  .ovl.hot { border-color:var(--ok); background:rgba(47,107,52,.14); }
  .ovl.hot b { background:var(--ok); }
  .ovl.un { border:2px dashed #8a8170; background:rgba(138,129,112,.08); }
  .ovl.un b { background:#8a8170; }
  .secline { font-size:.82rem; color:var(--muted); margin:.2rem 0 .6rem; }
  /* RIGHT: sequence cards */
  .right { width:54%; padding:1rem 1.2rem; }
  .toolbar { display:flex; gap:.5rem; align-items:center; margin-bottom:.8rem; flex-wrap:wrap; }
  .card { background:#fff; border:1px solid var(--line); border-radius:8px; padding:.8rem 1rem; margin-bottom:1rem; }
  .card h3 { margin:.1rem 0 .2rem; font-size:1.02rem; }
  .card .sub { color:var(--muted); font-size:.8rem; margin-bottom:.6rem; }
  .photos { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.7rem; }
  .frame { width:128px; background:#faf7f0; border:1px solid var(--line); border-radius:5px; padding:.3rem; }
  .frame img { display:block; max-height:130px; max-width:100%; margin:0 auto; }
  .frame .idx { text-align:center; font-size:.7rem; color:var(--muted); }
  .frame .ctrls { display:flex; gap:.15rem; justify-content:center; margin-top:.25rem; }
  .frame .ctrls button { padding:.1rem .35rem; font-size:.75rem; }
  .frame input.cap { width:100%; margin-top:.25rem; font-size:.78rem; padding:.2rem .3rem; border:1px solid var(--line); border-radius:4px; font-family:inherit; }
  .names { display:flex; gap:.5rem; align-items:end; }
  .names .field { flex:1; }
  .field { display:flex; flex-direction:column; gap:.2rem; margin-bottom:.5rem; }
  label { font-size:.74rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  input, textarea, select.slot { font-family:inherit; font-size:.95rem; padding:.4rem .5rem; border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--ink); }
  textarea { min-height:3.4rem; resize:vertical; }
  .row3 { display:flex; gap:.7rem; }
  .row3 .field { flex:1; }
  .forms { display:flex; gap:.7rem; flex-wrap:wrap; }
  .forms label { display:flex; align-items:center; gap:.3rem; text-transform:none; letter-spacing:0; font-size:.9rem; color:var(--ink); }
  .verdicts { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; margin-top:.5rem; }
  .saved { color:var(--ok); font-size:.8rem; opacity:0; transition:opacity .2s; }
  .saved.show { opacity:1; }
  .badge { font-size:.7rem; padding:.08rem .4rem; border-radius:9px; border:1px solid var(--line); color:var(--muted); }
  .badge.done { background:#e4efe0; color:var(--ok); border-color:#bcd9b6; }
  .empty { color:var(--muted); font-style:italic; padding:1rem 0; }
  .drawer { margin-top:1.2rem; border-top:1px solid var(--line); padding-top:.6rem; }
  .drawer summary { cursor:pointer; font-size:.9rem; color:var(--accent); }
  .ed { margin:.7rem 0; }
  .ed h4 { margin:.2rem 0; font-size:.86rem; }
  .ed .frm { display:flex; gap:.4rem; flex-wrap:wrap; align-items:center; margin-top:.3rem; }
  .ed input, .ed select { font-size:.85rem; padding:.25rem .4rem; }
  .small { font-size:.78rem; color:var(--muted); }
  .refrow { display:flex; gap:.5rem; align-items:center; padding:.2rem 0; font-size:.84rem; border-bottom:1px dotted var(--line); }
  .capforce { display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; }
</style>
</head>
<body>
<header>
  <h1>ATR &middot; Page Review</h1>
  <select id="book"></select>
  <button class="mini ghost" id="pprevc" title="previous page with content">&laquo; content</button>
  <button class="mini ghost" id="pnextc" title="next page with content">content &raquo;</button>
  <span class="who" id="who"></span>
  <div class="bar"><i id="barfill"></i></div>
  <span class="count" id="count">--</span>
  <span class="count" id="idx"></span>
  <div style="margin-left:auto; display:flex; gap:.4rem; align-items:center">
    <button class="mini" id="pprev" title="previous page">&larr;</button>
    <input type="number" id="page" min="1" style="width:5rem">
    <button class="mini" id="pnext" title="next page">&rarr;</button>
  </div>
</header>
<main>
  <div class="left">
    <div class="secline" id="secline"></div>
    <div class="pagewrap" id="pagewrap"><img id="pageimg" alt="page"></div>
  </div>
  <div class="right">
    <div class="toolbar" id="toolbar"></div>
    <div id="cards"></div>
    <details id="drawer" class="drawer">
      <summary>Teach the parser &mdash; refinements</summary>
      <div class="ed" id="ed-section"></div>
      <div class="ed" id="ed-lexicon"></div>
      <div class="ed" id="ed-refs"></div>
    </details>
  </div>
</main>
<datalist id="ctxs"><option>taijutsu</option><option>aiki-ken</option><option>aiki-jo</option></datalist>
<datalist id="kinds"><option>technique</option><option>suburi</option><option>kata</option><option>kumi</option><option>skip</option></datalist>

<datalist id="attacks">
  <option>shomenuchi</option><option>yokomenuchi</option><option>tsuki</option>
  <option>katate-dori</option><option>morote-dori</option><option>ryote-dori</option>
  <option>kata-dori</option><option>mune-dori</option><option>ushiro-ryote-dori</option>
  <option>ushiro-eri-dori</option><option>ushiro-kubishime</option>
</datalist>
<datalist id="techniques">
  <option>ikkyo</option><option>nikyo</option><option>sankyo</option><option>yonkyo</option><option>gokyo</option>
  <option>iriminage</option><option>shihonage</option><option>kotegaeshi</option><option>kaitennage</option>
  <option>tenchinage</option><option>koshinage</option><option>jujigarami</option><option>kokyunage</option>
  <option>kokyuho</option><option>udekimenage</option>
</datalist>

<script>
const FORMS = ["tachiwaza","suwariwaza","hanmihandachi","ken","jo"];
const CJK = /[぀-ヿ㐀-鿿豈-﫿]/;
let BOOKS = [], book = null, page = 1, PAGE = null, cards = [];
let mode = "committed", inflight = [], selected = new Set(), PREVIEW = null;
let IMAGES = null, idxTimer = null;
function ovrSel(){ return {book, page}; }
function pushOp(op){ inflight = inflight.filter(r => !(r.target==="region.ops" && JSON.stringify(r.payload)===JSON.stringify(op))); inflight.push({level:"page", target:"region.ops", selector:ovrSel(), payload:op}); reparse(); }

const $ = id => document.getElementById(id);
const enc = encodeURIComponent;
const clean = s => (s||"").replace(/\s+/g," ").trim();
async function api(p, o){ const r = await fetch(p, o); if(!r.ok) throw new Error(p+" "+r.status); return r.json(); }
function postj(p, body){ return api(p, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)}); }

async function boot(){
  const prog = await api("/api/progress");
  $("who").textContent = prog.reviewer_name || prog.reviewer;
  renderProgress(prog);
  BOOKS = await api("/api/books");
  $("book").innerHTML = BOOKS.map(b => `<option value="${b.id}">Vol.${b.volume||"?"} — ${(b.full_title||b.id)}</option>`).join("");
  book = BOOKS[0].id;
  page = (BOOKS[0].content_pages||[])[0] || 1;
  $("book").value = book;
  await loadPage();
  ensureIndex(book);
}
function curBook(){ return BOOKS.find(b => b.id === book); }
// Build/track the absolute volume image index; when ready, redraw with absolute numbers.
async function ensureIndex(b){
  IMAGES = await api(`/api/images/${enc(b)}`);
  if(IMAGES.ready){ $("idx").textContent = `${IMAGES.total_images} images indexed`; if(book===b && PAGE) loadPage(); return; }
  $("idx").textContent = `indexing images… ${IMAGES.done}/${IMAGES.total}`;
  clearTimeout(idxTimer);
  idxTimer = setTimeout(() => { if(book===b) ensureIndex(b); }, 2000);
}
function contentPages(){ return (IMAGES && IMAGES.ready && IMAGES.pages) ? IMAGES.pages : (curBook().content_pages||[]); }
function renderProgress(p){
  $("barfill").style.width = (p.total ? Math.round(100*p.reviewed/p.total) : 0) + "%";
  $("count").textContent = `${p.reviewed} / ${p.total} reviewed`;
}

async function loadPage(){
  $("page").value = page;
  mode = "committed"; inflight = []; selected.clear(); PREVIEW = null;
  $("cards").innerHTML = "<div class='empty'>loading…</div>";
  $("toolbar").innerHTML = "";
  PAGE = await api(`/api/page/${encodeURIComponent(book)}/${page}`);
  const s = PAGE.section;
  $("secline").textContent = `section: ${[s.context, s.kind, s.weapon, s.form].filter(x=>x && x!=="technique" && x!=="taijutsu").join(" / ") || "taijutsu / technique"}` + (s.note ? `  ·  ${s.note}` : "");
  $("pageimg").onload = drawOverlay;
  $("pageimg").src = PAGE.raw_page_url + "?t=" + Date.now();
  renderToolbar();
  renderCards();
  loadEditors();
}

function renderToolbar(){
  if(mode === "committed"){
    $("toolbar").innerHTML = `<button class="primary" id="reparse">Re-parse this page</button>
      <span class="badge">${PAGE.techniques.length} sequence(s)</span>`;
    $("reparse").onclick = () => reparse();
  } else {
    const n = selected.size;
    $("toolbar").innerHTML = `
      <span class="badge" style="background:#fff3c4;color:#8a6d00;border-color:#e0c97a">PREVIEW — uncommitted</span>
      <button class="mini" id="rmerge" ${n<2?"disabled":""}>Merge ${n||""}</button>
      <button class="mini" id="rdrop" ${n<1?"disabled":""}>Drop ${n||""}</button>
      <button class="mini" id="rrow">Order: row</button>
      <button class="mini" id="rcol">Order: col</button>
      <button class="mini ghost" id="rclear">Discard overrides</button>
      <button class="good" id="rcommit">Commit page</button>
      <span class="count">${inflight.length} override(s) · click photo boxes on the left to select</span>
      <div class="capforce" style="flex-basis:100%; margin-top:.4rem">
        force caption: <input id="fc-r" placeholder="romaji" style="width:11rem">
        <input id="fc-n" placeholder="Japanese" style="width:8rem">
        <input id="fc-a" list="attacks" placeholder="attack" style="width:7rem">
        <input id="fc-t" list="techniques" placeholder="technique" style="width:7rem">
        <button class="mini" id="fc-add">apply caption</button></div>`;
    $("rmerge").onclick = () => { pushOp({op:"merge", indices:[...selected].sort((a,b)=>a-b)}); selected.clear(); };
    $("rdrop").onclick  = () => { pushOp({op:"drop", indices:[...selected]}); selected.clear(); };
    $("rrow").onclick   = () => pushOp({op:"order", order:"row"});
    $("rcol").onclick   = () => pushOp({op:"order", order:"column"});
    $("rclear").onclick = () => { inflight = []; selected.clear(); loadPage(); };
    $("rcommit").onclick = () => commitPage();
    $("fc-add").onclick = () => {
      inflight = inflight.filter(r => r.target !== "caption");
      inflight.push({level:"page", target:"caption", selector:ovrSel(), payload:{
        name_romaji:$("fc-r").value, name_native:$("fc-n").value,
        slots:{attack:$("fc-a").value||null, technique:$("fc-t").value||null, direction:null, form:[]},
        suppress_detection:true}});
      reparse();
    };
  }
}

async function reparse(){
  $("toolbar").innerHTML = "<span class='badge'>re-parsing… (OCR, a few seconds)</span>";
  PREVIEW = await api(`/api/reparse/${encodeURIComponent(book)}/${page}`,
    {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({refinements:inflight})});
  mode = "preview";
  renderToolbar();
  renderPreviewCards();
  drawPreviewOverlay();
}

function renderPreviewCards(){
  const ts = PREVIEW.techniques;
  $("cards").innerHTML = ts.length ? "" : "<div class='empty'>This page produced no sequences. Add an override or drop fewer regions.</div>";
  ts.forEach((t, ti) => {
    const tech = t.technique;
    const ctx = [tech.context, tech.kind, tech.weapon, tech.form].filter(x=>x && x!=="technique" && x!=="taijutsu").join(" / ");
    const el = document.createElement("div"); el.className = "card";
    el.innerHTML = `<h3>${ti+1}. ${clean(tech.raw_caption || tech.name_romaji || tech.id)}</h3>
      <div class="sub">${ctx ? ctx+"  ·  " : ""}${t.keyframes.length} step(s) · projected</div>
      <div class="photos">${t.keyframes.map((k,ki)=>`<div class="frame"><div class="idx">${ki+1}</div><img src="${k.img}" loading="lazy"></div>`).join("")}</div>`;
    $("cards").appendChild(el);
  });
}

function drawPreviewOverlay(){
  const img = $("pageimg"), wrap = $("pagewrap");
  wrap.querySelectorAll(".ovl").forEach(e => e.remove());
  if(!img.naturalWidth || !PREVIEW) return;
  const scale = img.clientWidth / img.naturalWidth;
  PREVIEW.regions.forEach((r, i) => {
    const d = document.createElement("div");
    d.className = "ovl" + (selected.has(i) ? " hot" : "");
    d.style.left = (r[0]*scale)+"px"; d.style.top = (r[1]*scale)+"px";
    d.style.width = (r[2]*scale)+"px"; d.style.height = (r[3]*scale)+"px";
    d.innerHTML = `<b>${i}</b>`;
    d.style.cursor = "pointer";
    d.onclick = () => { selected.has(i) ? selected.delete(i) : selected.add(i); drawPreviewOverlay(); renderToolbar(); };
    wrap.appendChild(d);
  });
}

async function commitPage(){
  if(!confirm("Commit this page's parse to the corpus? This replaces the page's records and saves the overrides.")) return;
  $("toolbar").innerHTML = "<span class='badge'>committing…</span>";
  const r = await postj(`/api/commit-page/${enc(book)}/${page}`, {refinements:inflight});
  inflight = []; selected.clear();
  await loadPage();
  renderProgress(await api("/api/progress"));
  $("toolbar").insertAdjacentHTML("beforeend", `<span class="saved show">committed ${r.committed} sequence(s)</span>`);
}

async function loadEditors(){
  // -- volume: section map --
  const sx = await api(`/api/sections/${enc(book)}`);
  $("ed-section").innerHTML = `<h4>Volume sections &mdash; ${(curBook().full_title||book)}</h4>
    <div class="small">seed: ${sx.seed.map(s=>`${s.start}-${s.end} ${s.context}/${s.kind}${s.form?"("+s.form+")":""}`).join("  ·  ")||"none"}</div>
    <div class="small">overrides: ${sx.refinements.length}</div>
    <div class="frm">pages <input id="se-a" type="number" style="width:4.2rem"> &ndash; <input id="se-b" type="number" style="width:4.2rem">
      <input id="se-ctx" list="ctxs" placeholder="context" style="width:7rem">
      <input id="se-kind" list="kinds" placeholder="kind" style="width:7rem">
      <input id="se-w" placeholder="weapon" style="width:4rem">
      <input id="se-form" placeholder="form" style="width:6rem">
      <button class="mini" id="se-add">add section override</button></div>`;
  $("se-add").onclick = addSection;
  // -- process: lexicon --
  $("ed-lexicon").innerHTML = `<h4>Vocabulary (process &mdash; teaches every book)</h4>
    <div class="frm"><select id="lx-slot"><option>technique</option><option>attack</option><option>direction</option><option>form</option></select>
      <input id="lx-canon" placeholder="canonical e.g. koshi-nage" style="width:9rem">
      <input id="lx-var" placeholder="romaji variants (comma)" style="width:10rem">
      <input id="lx-kanji" placeholder="kanji (comma)" style="width:8rem">
      <button class="mini" id="lx-add">teach term</button><span class="small">re-parse to apply</span></div>`;
  $("lx-add").onclick = addLexicon;
  // -- refinements list (this book) --
  const refs = await api(`/api/refinements?book=${enc(book)}`);
  $("ed-refs").innerHTML = `<h4>Refinements for this book (${refs.length})</h4>` + (refs.map(r=>`
    <div class="refrow"><span class="badge ${r.status==='confirmed'?'done':''}">${r.status}</span>
      <b>${r.target}</b><span class="small">${r.scope.level} · ${JSON.stringify(r.scope.selector)} · ${r.provenance.author} ${r.provenance.date}</span>
      <button class="mini ghost" data-c="${r.id}">confirm</button>
      <button class="mini ghost" data-d="${r.id}">delete</button></div>`).join("") || "<div class='small'>none yet</div>");
  $("ed-refs").querySelectorAll("[data-d]").forEach(b => b.onclick = async () => { await postj("/api/refinements/delete", {id:b.dataset.d}); loadEditors(); });
  $("ed-refs").querySelectorAll("[data-c]").forEach(b => b.onclick = async () => { await postj("/api/refinements/confirm", {id:b.dataset.c}); loadEditors(); });
}

async function addSection(){
  const a = +$("se-a").value, b = +$("se-b").value;
  if(!a || !b) return;
  await postj("/api/refinements", {level:"book", target:"section",
    selector:{book, pages:[a,b]},
    payload:{context:$("se-ctx").value||"taijutsu", kind:$("se-kind").value||"technique",
             weapon:$("se-w").value||null, form:$("se-form").value||null}});
  loadEditors();
  if(page>=a && page<=b) loadPage();   // current page is in the range -> refresh its section
}
async function addLexicon(){
  const canon = $("lx-canon").value.trim();
  if(!canon) return;
  await postj("/api/refinements", {level:"process", target:"lexicon.entry", selector:{},
    payload:{slot:$("lx-slot").value, canonical:canon,
      variants:$("lx-var").value.split(",").map(s=>s.trim()).filter(Boolean),
      kanji:$("lx-kanji").value.split(",").map(s=>s.trim()).filter(Boolean)}});
  loadEditors();
}

function drawOverlay(){
  const img = $("pageimg"), wrap = $("pagewrap");
  wrap.querySelectorAll(".ovl").forEach(e => e.remove());
  if(!img.naturalWidth) return;
  const scale = img.clientWidth / img.naturalWidth;
  if(PAGE.regions && PAGE.regions.length){
    // every detected image on the page, with its ABSOLUTE volume number; unassigned ones dashed.
    const tIdxByBbox = {};
    PAGE.techniques.forEach((t, ti) => t.keyframes.forEach(k => { const b=(k.source||{}).bbox; if(b) tIdxByBbox[b.join(",")] = ti; }));
    PAGE.regions.forEach(r => {
      const d = document.createElement("div");
      const ti = tIdxByBbox[r.bbox.join(",")];
      d.className = "ovl" + (r.assigned ? "" : " un");
      if(ti != null) d.dataset.t = ti;
      d.style.left = (r.bbox[0]*scale)+"px"; d.style.top = (r.bbox[1]*scale)+"px";
      d.style.width = (r.bbox[2]*scale)+"px"; d.style.height = (r.bbox[3]*scale)+"px";
      d.innerHTML = `<b>#${r.n}${r.assigned ? "" : " ·unextracted"}</b>`;
      if(ti != null){ d.onmouseenter = () => highlight(ti, true); d.onmouseleave = () => highlight(ti, false); }
      wrap.appendChild(d);
    });
    return;
  }
  PAGE.techniques.forEach((t, ti) => {       // fallback before the index is built
    t.keyframes.forEach((k, ki) => {
      const b = (k.source||{}).bbox; if(!b) return;
      const d = document.createElement("div");
      d.className = "ovl"; d.dataset.t = ti;
      d.style.left = (b[0]*scale)+"px"; d.style.top = (b[1]*scale)+"px";
      d.style.width = (b[2]*scale)+"px"; d.style.height = (b[3]*scale)+"px";
      d.innerHTML = `<b>${ti+1}.${ki+1}</b>`;
      d.onmouseenter = () => highlight(ti, true);
      d.onmouseleave = () => highlight(ti, false);
      wrap.appendChild(d);
    });
  });
}
function highlight(ti, on){
  document.querySelectorAll(`.ovl[data-t='${ti}']`).forEach(e => e.classList.toggle("hot", on));
  const card = document.getElementById("card-"+ti);
  if(card) card.style.outline = on ? "2px solid var(--ok)" : "";
}
window.addEventListener("resize", () => { if(mode==="preview") drawPreviewOverlay(); else if(PAGE) drawOverlay(); });

function renderCards(){
  cards = [];
  if(!PAGE.techniques.length){ $("cards").innerHTML = "<div class='empty'>No parsed sequences on this page. (Re-parse / overrides come next.)</div>"; return; }
  $("cards").innerHTML = "";
  PAGE.techniques.forEach((t, ti) => $("cards").appendChild(buildCard(t, ti)));
}

function buildCard(t, ti){
  const tech = t.technique, r = t.review;
  const el = document.createElement("div");
  el.className = "card"; el.id = "card-"+ti;
  el.onmouseenter = () => highlight(ti, true);
  el.onmouseleave = () => highlight(ti, false);
  const ctx = [tech.context, tech.kind, tech.weapon, tech.form].filter(x=>x && x!=="technique" && x!=="taijutsu").join(" / ");
  const provisional = clean(tech.raw_caption || tech.name_romaji || "");
  // working keyframe sequence (review's edited one, else original from this page payload)
  let seq = (r && r.keyframes) ? r.keyframes.map(k => ({image:k.image, img:imgFor(k.image), caption:k.caption||""}))
                               : t.keyframes.map(k => ({image:k.image, img:k.img, caption:"", abs:k.abs_n}));
  const slots = (r && r.slots) || tech.slots || {};
  const nameR = r ? (r.name_romaji||"") : (CJK.test(provisional) ? "" : provisional);
  const nameN = r ? (r.name_native||"") : (CJK.test(provisional) ? provisional : (tech.name_native||""));

  el.innerHTML = `
    <h3>${ti+1}. ${clean(tech.raw_caption || tech.name_romaji || tech.id)}</h3>
    <div class="sub">${ctx ? ctx+"  ·  " : ""}${tech.step_count||t.keyframes.length} step(s)${r ? "  ·  "+r.verdict : ""}</div>
    <div class="photos"></div>
    <div class="names">
      <div class="field"><label>Name (romaji)</label><input class="nr" value="${esc(nameR)}" placeholder="e.g. katate-dori shiho-nage"></div>
      <button class="mini swap" title="swap">&#8644;</button>
      <div class="field"><label>Name (Japanese)</label><input class="nn" value="${esc(nameN)}"></div>
    </div>
    <div class="row3">
      <div class="field"><label>Attack</label><input class="at" list="attacks" value="${esc(slots.attack||"")}"></div>
      <div class="field"><label>Technique</label><input class="te" list="techniques" value="${esc(slots.technique||"")}"></div>
      <div class="field"><label>Direction</label><select class="slot di"><option value="">--</option><option ${slots.direction==="omote"?"selected":""}>omote</option><option ${slots.direction==="ura"?"selected":""}>ura</option></select></div>
    </div>
    <div class="field"><label>Form</label><div class="forms">${FORMS.map(f=>`<label><input type="checkbox" class="fm" value="${f}" ${(slots.form||[]).includes(f)?"checked":""}> ${f}</label>`).join("")}</div></div>
    <div class="field"><label>What the name doesn't carry</label><textarea class="note">${esc(r&&r.note||"")}</textarea></div>
    <div class="verdicts">
      <button class="good vC">Confirm</button>
      <button class="primary vK">Save correction</button>
      <button class="ghost vS">Skip</button>
      <button class="ghost vR" title="not a technique">Not a technique</button>
      <span class="saved">saved</span>
    </div>`;

  const c = { el, tech, seq };
  cards[ti] = c;
  renderSeq(c);
  el.querySelector(".swap").onclick = () => { const a=el.querySelector(".nr"), b=el.querySelector(".nn"); [a.value,b.value]=[b.value,a.value]; };
  el.querySelector(".vC").onclick = () => save(c, "confirmed");
  el.querySelector(".vK").onclick = () => save(c, "corrected");
  el.querySelector(".vS").onclick = () => save(c, "skip");
  el.querySelector(".vR").onclick = () => save(c, "rejected");
  return el;
}

function imgFor(image){ const m="resources/books/processed/"; return image && image.includes(m) ? "/img/"+image.split(m)[1] : image; }
function esc(s){ return (s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

function renderSeq(c){
  const box = c.el.querySelector(".photos");
  box.innerHTML = c.seq.map((k,i)=>`
    <div class="frame" data-i="${i}">
      <div class="idx">${i+1}${k.abs?` · #${k.abs}`:""}</div>
      <img src="${k.img}" loading="lazy">
      <div class="ctrls"><button data-a="l" ${i===0?"disabled":""}>&larr;</button><button data-a="d">&#215;</button><button data-a="r" ${i===c.seq.length-1?"disabled":""}>&rarr;</button></div>
      <input class="cap" data-i="${i}" placeholder="caption" value="${esc(k.caption)}">
    </div>`).join("") || "<em class='empty'>(no images)</em>";
  box.querySelectorAll(".ctrls button").forEach(b => b.onclick = () => {
    const i=+b.closest(".frame").dataset.i, a=b.dataset.a;
    if(a==="d") c.seq.splice(i,1);
    else if(a==="l"&&i>0) [c.seq[i-1],c.seq[i]]=[c.seq[i],c.seq[i-1]];
    else if(a==="r"&&i<c.seq.length-1) [c.seq[i+1],c.seq[i]]=[c.seq[i],c.seq[i+1]];
    renderSeq(c);
  });
  box.querySelectorAll("input.cap").forEach(inp => inp.oninput = () => c.seq[+inp.dataset.i].caption = inp.value);
}

async function save(c, verdict){
  const el = c.el;
  const origImages = JSON.stringify((PAGE.techniques.find(x=>x.technique.id===c.tech.id).keyframes||[]).map(k=>k.image));
  const seqChanged = JSON.stringify(c.seq.map(k=>k.image)) !== origImages || c.seq.some(k=>k.caption);
  const payload = {
    verdict,
    name_romaji: clean(el.querySelector(".nr").value),
    name_native: clean(el.querySelector(".nn").value),
    slots: {
      attack: clean(el.querySelector(".at").value),
      technique: clean(el.querySelector(".te").value),
      direction: el.querySelector(".di").value,
      form: [...el.querySelectorAll(".fm")].filter(x=>x.checked).map(x=>x.value),
    },
    keyframes: seqChanged ? c.seq.map(k=>({image:k.image, caption:k.caption||""})) : null,
    note: el.querySelector(".note").value.trim(),
  };
  await api(`/api/review/${encodeURIComponent(c.tech.id)}`, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
  const s = el.querySelector(".saved"); s.classList.add("show"); setTimeout(()=>s.classList.remove("show"), 900);
  renderProgress(await api("/api/progress"));
}

// navigation
function goPage(p){ const b=curBook(); page = Math.max(1, Math.min(p, b.pages||p)); loadPage(); }
function nearestContent(dir){
  const cp = contentPages();
  if(dir>0){ const n = cp.find(p=>p>page); if(n) goPage(n); }
  else { const prev = [...cp].reverse().find(p=>p<page); if(prev) goPage(prev); }
}
$("book").onchange = () => { book = $("book").value; IMAGES = null; $("idx").textContent=""; page = (curBook().content_pages||[])[0]||1; loadPage(); ensureIndex(book); };
$("page").onchange = () => goPage(+$("page").value);
$("pprev").onclick = () => goPage(page-1);
$("pnext").onclick = () => goPage(page+1);
$("pprevc").onclick = () => nearestContent(-1);
$("pnextc").onclick = () => nearestContent(1);

boot().catch(e => $("cards").innerHTML = "<div class='empty'>Error: "+e.message+"</div>");
</script>
</body>
</html>
